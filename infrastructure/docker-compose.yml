version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: miracle-ar-db
    environment:
      POSTGRES_DB: miraclear
      POSTGRES_USER: miraclear
      POSTGRES_PASSWORD: miraclear123
    # ports:
    # - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miraclear"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME}/ar-backend:main
    container_name: miracle-ar-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/miraclear
      SPRING_DATASOURCE_USERNAME: miraclear
      SPRING_DATASOURCE_PASSWORD: miraclear123
    ports:
      - "3062:3062"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${DOCKER_USERNAME}/ar-frontend:main
    container_name: miracle-ar-frontend
    ports:
      - "80:80"

volumes:
  postgres_data:
